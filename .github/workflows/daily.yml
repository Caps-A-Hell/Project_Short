name: Daily Shorts Feed

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '59 21 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python fetch_shorts.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add *.html *.json
          git diff --cached --quiet || git commit -m "Aggiornamento shorts $(date +'%d/%m/%Y')"
          git push
